<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SC mAb Formulation 용어집</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&family=Playfair+Display:wght@700;800&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/mammoth/1.8.0/mammoth.browser.min.js"></script>
<style>
:root {
  --bg: #f5f7fa;
  --surface: #ffffff;
  --surface2: #f0f2f5;
  --surface3: #e8ebf0;
  --border: #dce0e8;
  --border-hl: #c4cad6;
  --text: #1e293b;
  --text2: #475569;
  --text3: #94a3b8;
  --accent: #3b82f6;
  --accent2: #6366f1;
  --accent-dim: rgba(59,130,246,0.08);
  --accent-dim2: rgba(99,102,241,0.07);
  --green: #10b981;
  --green-dim: rgba(16,185,129,0.08);
  --amber: #f59e0b;
  --amber-dim: rgba(245,158,11,0.08);
  --red: #ef4444;
  --red-dim: rgba(239,68,68,0.08);
  --cat-basics: #3b82f6;
  --cat-route: #7c3aed;
  --cat-surf: #ec4899;
  --cat-buffer: #059669;
  --cat-stab: #d97706;
  --cat-other: #ea580c;
  --cat-pheno: #9333ea;
  --cat-origin: #0d9488;
  --cat-ind: #dc2626;
  --cat-prod: #c026d3;
  --cat-anal: #0284c7;
  --cat-reg: #64748b;
  --cat-exp: #16a34a;
  --cat-pk: #ea580c;
  --cat-ai: #4f46e5;
  --cat-cert: #65a30d;
  --radius: 10px;
  --radius-sm: 6px;
  --shadow: 0 2px 12px rgba(0,0,0,0.06);
}
* { margin:0; padding:0; box-sizing:border-box; }
body {
  font-family: 'Noto Sans KR', sans-serif;
  background: var(--bg);
  color: var(--text);
  min-height: 100vh;
  line-height: 1.6;
}
::selection { background: var(--accent); color: white; }
::-webkit-scrollbar { width: 6px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: var(--border-hl); border-radius: 3px; }
::-webkit-scrollbar-thumb:hover { background: #a0aab8; }

/* Header */
.header {
  position: sticky; top: 0; z-index: 100;
  background: rgba(245,247,250,0.88);
  backdrop-filter: blur(20px);
  border-bottom: 1px solid var(--border);
  padding: 16px 32px;
}
.header-inner {
  max-width: 1400px; margin: 0 auto;
  display: flex; align-items: center; justify-content: space-between; gap: 24px;
  flex-wrap: wrap;
}
.logo {
  display: flex; align-items: baseline; gap: 10px;
  flex-shrink: 0;
}
.logo-mark {
  font-family: 'Playfair Display', serif;
  font-size: 22px; font-weight: 800;
  background: linear-gradient(135deg, #2563eb, #4f46e5);
  -webkit-background-clip: text; -webkit-text-fill-color: transparent;
  letter-spacing: -0.5px;
}
.logo-sub { font-size: 12px; color: var(--text3); font-weight: 400; letter-spacing: 1px; text-transform: uppercase; }
.header-stats {
  display: flex; gap: 20px; align-items: center;
}
.stat {
  display: flex; flex-direction: column; align-items: center; gap: 2px;
}
.stat-num {
  font-family: 'JetBrains Mono', monospace;
  font-size: 20px; font-weight: 500; color: var(--accent);
}
.stat-label { font-size: 10px; color: var(--text3); text-transform: uppercase; letter-spacing: 1px; }

/* Search bar */
.search-wrap {
  flex: 1; max-width: 420px; position: relative;
}
.search-input {
  width: 100%; padding: 10px 16px 10px 40px;
  background: var(--surface2); border: 1px solid var(--border);
  border-radius: var(--radius); color: var(--text);
  font-size: 14px; font-family: inherit;
  transition: border-color 0.2s, box-shadow 0.2s;
}
.search-input:focus {
  outline: none; border-color: var(--accent);
  box-shadow: 0 0 0 3px var(--accent-dim);
}
.search-input::placeholder { color: var(--text3); }
.search-icon {
  position: absolute; left: 12px; top: 50%; transform: translateY(-50%);
  color: var(--text3); pointer-events: none;
}
.search-count {
  position: absolute; right: 12px; top: 50%; transform: translateY(-50%);
  font-size: 11px; color: var(--text3);
  font-family: 'JetBrains Mono', monospace;
}

/* Layout */
.layout {
  max-width: 1400px; margin: 0 auto; padding: 24px 32px;
  display: grid; grid-template-columns: 220px 1fr; gap: 24px;
}
@media (max-width: 900px) {
  .layout { grid-template-columns: 1fr; padding: 16px; }
  .sidebar { display: none; }
  .header-inner { flex-direction: column; align-items: stretch; }
  .search-wrap { max-width: 100%; }
}

/* Sidebar */
.sidebar {
  position: sticky; top: 80px; align-self: start;
  display: flex; flex-direction: column; gap: 4px;
  max-height: calc(100vh - 100px); overflow-y: auto;
}
.sidebar-btn {
  display: flex; align-items: center; gap: 8px;
  padding: 8px 12px; border: none; background: transparent;
  color: var(--text2); font-size: 12px; font-family: inherit;
  border-radius: var(--radius-sm); cursor: pointer;
  text-align: left; transition: all 0.15s;
  white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
}
.sidebar-btn:hover { background: var(--surface2); color: var(--text); }
.sidebar-btn.active { background: var(--accent-dim); color: var(--accent); font-weight: 500; }
.sidebar-btn .cat-dot {
  width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0;
}
.sidebar-btn .cat-count {
  margin-left: auto; font-family: 'JetBrains Mono', monospace;
  font-size: 10px; color: var(--text3); flex-shrink: 0;
}

/* Main content */
.main { min-width: 0; }
.category-section { margin-bottom: 32px; }
.category-header {
  display: flex; align-items: center; gap: 10px;
  padding: 12px 16px; margin-bottom: 12px;
  background: var(--surface); border: 1px solid var(--border);
  border-radius: var(--radius); position: sticky; top: 68px; z-index: 10;
  box-shadow: 0 1px 4px rgba(0,0,0,0.04);
}
.category-dot { width: 10px; height: 10px; border-radius: 50%; flex-shrink: 0; }
.category-name { font-size: 14px; font-weight: 600; }
.category-count {
  margin-left: auto;
  font-family: 'JetBrains Mono', monospace;
  font-size: 11px; color: var(--text3);
  background: var(--surface2); padding: 2px 8px; border-radius: 20px;
}

/* Term cards */
.term-grid {
  display: grid; grid-template-columns: repeat(auto-fill, minmax(340px, 1fr)); gap: 10px;
}
.term-card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 16px;
  transition: all 0.2s;
  cursor: default;
  animation: fadeIn 0.3s ease;
}
@keyframes fadeIn {
  from { opacity: 0; transform: translateY(8px); }
  to { opacity: 1; transform: translateY(0); }
}
.term-card:hover {
  border-color: var(--border-hl);
  box-shadow: var(--shadow);
  transform: translateY(-1px);
}
.term-card.new-term {
  border-color: var(--green);
  box-shadow: 0 0 0 1px var(--green-dim), 0 2px 8px rgba(16,185,129,0.1);
}
.term-card.new-term::before {
  content: 'NEW'; position: absolute; top: 8px; right: 8px;
  font-size: 9px; font-weight: 700; letter-spacing: 1px;
  background: var(--green); color: white;
  padding: 2px 6px; border-radius: 3px;
}
.term-card { position: relative; }
.term-top {
  display: flex; align-items: baseline; gap: 8px; margin-bottom: 6px;
  flex-wrap: wrap;
}
.term-kr { font-size: 15px; font-weight: 600; color: var(--text); }
.term-eng { font-size: 12px; color: var(--text2); }
.term-meta {
  display: flex; gap: 6px; margin-bottom: 8px; flex-wrap: wrap;
}
.term-badge {
  font-family: 'JetBrains Mono', monospace;
  font-size: 10px; padding: 2px 7px;
  border-radius: 4px; font-weight: 500;
}
.badge-abbr { background: var(--accent-dim); color: var(--accent); }
.badge-pron { background: var(--accent-dim2); color: var(--accent2); }
.term-desc {
  font-size: 13px; color: var(--text2); line-height: 1.65;
}

/* Edit mode */
.term-edit-btn {
  position: absolute; top: 10px; right: 10px;
  background: none; border: 1px solid transparent;
  color: var(--text3); cursor: pointer;
  width: 28px; height: 28px; border-radius: var(--radius-sm);
  display: flex; align-items: center; justify-content: center;
  opacity: 0; transition: all 0.15s;
}
.term-card:hover .term-edit-btn { opacity: 1; }
.term-edit-btn:hover { background: var(--surface2); border-color: var(--border); color: var(--accent); }
.term-card.editing { border-color: var(--accent); box-shadow: 0 0 0 2px var(--accent-dim), var(--shadow); }
.term-card.editing .term-edit-btn { display: none; }
.term-card.editing .term-view { display: none; }
.term-card .term-form { display: none; }
.term-card.editing .term-form { display: block; }
.edit-field { margin-bottom: 8px; }
.edit-label {
  font-size: 10px; font-weight: 600; color: var(--text3);
  text-transform: uppercase; letter-spacing: 0.5px;
  margin-bottom: 3px; display: block;
}
.edit-input, .edit-textarea {
  width: 100%; padding: 7px 10px;
  background: var(--surface2); border: 1px solid var(--border);
  border-radius: var(--radius-sm); color: var(--text);
  font-size: 13px; font-family: inherit;
  transition: border-color 0.15s;
}
.edit-input:focus, .edit-textarea:focus {
  outline: none; border-color: var(--accent);
  box-shadow: 0 0 0 2px var(--accent-dim);
}
.edit-textarea { resize: vertical; min-height: 60px; line-height: 1.5; }
.edit-row { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
.edit-actions {
  display: flex; gap: 6px; margin-top: 10px; justify-content: flex-end;
}
.edit-save, .edit-cancel, .edit-delete {
  padding: 6px 14px; border: none; border-radius: var(--radius-sm);
  font-size: 12px; font-weight: 600; font-family: inherit;
  cursor: pointer; transition: all 0.15s;
}
.edit-save { background: var(--accent); color: white; }
.edit-save:hover { background: #2563eb; }
.edit-cancel { background: var(--surface3); color: var(--text2); }
.edit-cancel:hover { background: var(--border); }
.edit-delete { background: none; color: var(--red); margin-right: auto; }
.edit-delete:hover { background: var(--red-dim); }

/* Upload panel */
.upload-panel {
  position: fixed; bottom: 24px; right: 24px; z-index: 200;
}
.upload-toggle {
  width: 56px; height: 56px; border-radius: 50%;
  background: linear-gradient(135deg, #3b82f6, #6366f1);
  border: none; color: white; font-size: 24px;
  cursor: pointer; box-shadow: 0 4px 20px rgba(59,130,246,0.35);
  transition: all 0.2s;
  display: flex; align-items: center; justify-content: center;
}
.upload-toggle:hover { transform: scale(1.08); box-shadow: 0 6px 28px rgba(59,130,246,0.4); }
.upload-toggle.active { border-radius: var(--radius); }

.upload-modal {
  display: none; position: fixed; inset: 0; z-index: 300;
  background: rgba(0,0,0,0.35); backdrop-filter: blur(4px);
  align-items: center; justify-content: center;
}
.upload-modal.show { display: flex; }
.upload-box {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 16px;
  padding: 32px;
  width: min(560px, 90vw);
  max-height: 85vh;
  overflow-y: auto;
  box-shadow: 0 20px 60px rgba(0,0,0,0.15);
  animation: modalIn 0.25s ease;
}
@keyframes modalIn {
  from { opacity: 0; transform: scale(0.95) translateY(10px); }
  to { opacity: 1; transform: scale(1) translateY(0); }
}
.upload-title {
  font-size: 18px; font-weight: 700; margin-bottom: 4px;
  display: flex; align-items: center; gap: 8px;
}
.upload-subtitle { font-size: 13px; color: var(--text3); margin-bottom: 20px; }
.upload-close {
  position: absolute; top: 16px; right: 16px;
  background: none; border: none; color: var(--text3);
  font-size: 20px; cursor: pointer; padding: 4px;
}
.upload-close:hover { color: var(--text); }

.dropzone {
  border: 2px dashed var(--border);
  border-radius: var(--radius);
  padding: 40px 24px;
  text-align: center;
  transition: all 0.2s;
  cursor: pointer;
  margin-bottom: 16px;
}
.dropzone:hover, .dropzone.dragover {
  border-color: var(--accent);
  background: var(--accent-dim);
}
.dropzone-icon { font-size: 36px; margin-bottom: 8px; }
.dropzone-text { font-size: 13px; color: var(--text2); }
.dropzone-hint { font-size: 11px; color: var(--text3); margin-top: 4px; }

.file-info {
  display: none; align-items: center; gap: 10px;
  padding: 10px 14px; background: var(--surface2);
  border-radius: var(--radius-sm); margin-bottom: 16px;
}
.file-info.show { display: flex; }
.file-name { font-size: 13px; color: var(--text); flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
.file-remove {
  background: none; border: none; color: var(--text3);
  cursor: pointer; font-size: 16px; padding: 2px;
}
.file-remove:hover { color: var(--red); }

.extract-btn {
  width: 100%; padding: 12px;
  background: linear-gradient(135deg, #3b82f6, #6366f1);
  border: none; border-radius: var(--radius);
  color: white; font-size: 14px; font-weight: 600;
  font-family: inherit; cursor: pointer;
  transition: all 0.2s; opacity: 0.4; pointer-events: none;
}
.extract-btn.ready { opacity: 1; pointer-events: auto; }
.extract-btn.ready:hover { transform: translateY(-1px); box-shadow: 0 4px 16px rgba(59,130,246,0.3); }
.extract-btn.loading {
  opacity: 0.7; pointer-events: none;
  background: var(--surface3);
}

/* Progress */
.progress-area { display: none; margin-top: 16px; }
.progress-area.show { display: block; }
.progress-bar-wrap {
  height: 4px; background: var(--surface3);
  border-radius: 2px; overflow: hidden; margin-bottom: 10px;
}
.progress-bar {
  height: 100%; width: 0%;
  background: linear-gradient(90deg, #3b82f6, #6366f1);
  border-radius: 2px; transition: width 0.5s ease;
}
.progress-text { font-size: 12px; color: var(--text3); }

/* Results */
.results-area { display: none; margin-top: 20px; }
.results-area.show { display: block; }
.results-header {
  display: flex; align-items: center; gap: 8px; margin-bottom: 12px;
}
.results-title { font-size: 14px; font-weight: 600; }
.results-count {
  font-family: 'JetBrains Mono', monospace;
  font-size: 11px; color: var(--green);
  background: var(--green-dim); padding: 2px 8px; border-radius: 20px;
}
.result-item {
  background: var(--surface2);
  border: 1px solid var(--border);
  border-radius: var(--radius-sm);
  padding: 12px 14px;
  margin-bottom: 8px;
  display: flex; align-items: flex-start; gap: 12px;
}
.result-check {
  appearance: none; width: 18px; height: 18px; flex-shrink: 0;
  border: 2px solid var(--border-hl); border-radius: 4px;
  cursor: pointer; margin-top: 2px; position: relative;
  transition: all 0.15s;
}
.result-check:checked {
  background: var(--accent); border-color: var(--accent);
}
.result-check:checked::after {
  content: '✓'; position: absolute; top: -1px; left: 2px;
  color: white; font-size: 12px; font-weight: 700;
}
.result-body { flex: 1; min-width: 0; }
.result-term { font-size: 14px; font-weight: 600; margin-bottom: 2px; }
.result-eng { font-size: 11px; color: var(--text2); margin-bottom: 4px; }
.result-desc { font-size: 12px; color: var(--text3); line-height: 1.5; }
.result-dup {
  font-size: 10px; color: var(--amber);
  background: var(--amber-dim); padding: 1px 6px;
  border-radius: 3px; display: inline-block; margin-top: 4px;
}

.add-btn {
  width: 100%; padding: 12px; margin-top: 12px;
  background: var(--green); border: none;
  border-radius: var(--radius); color: white;
  font-size: 14px; font-weight: 600;
  font-family: inherit; cursor: pointer;
  transition: all 0.2s;
}
.add-btn:hover { transform: translateY(-1px); box-shadow: 0 4px 16px rgba(16,185,129,0.25); }

/* Toast */
.toast {
  position: fixed; bottom: 90px; right: 24px; z-index: 400;
  background: var(--surface2); border: 1px solid var(--border);
  border-radius: var(--radius); padding: 12px 20px;
  font-size: 13px; box-shadow: var(--shadow);
  transform: translateY(20px); opacity: 0;
  transition: all 0.3s; pointer-events: none;
}
.toast.show { transform: translateY(0); opacity: 1; }
.toast.success { border-color: var(--green); }
.toast.error { border-color: var(--red); }

/* Empty state */
.empty-state {
  text-align: center; padding: 60px 20px; color: var(--text3);
}
.empty-state-icon { font-size: 48px; margin-bottom: 12px; opacity: 0.5; }
.empty-state-text { font-size: 14px; }
</style>
</head>
<body>

<header class="header">
  <div class="header-inner">
    <div class="logo">
      <span class="logo-mark">SC mAb Glossary</span>
      <span class="logo-sub">첨가물 패턴 분석 용어집</span>
    </div>
    <div class="search-wrap">
      <svg class="search-icon" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>
      <input type="text" class="search-input" id="searchInput" placeholder="용어, 영문명, 약어로 검색...">
      <span class="search-count" id="searchCount"></span>
    </div>
    <div class="header-stats">
      <div class="stat">
        <span class="stat-num" id="termCount">0</span>
        <span class="stat-label">용어</span>
      </div>
      <div class="stat">
        <span class="stat-num" id="catCount">0</span>
        <span class="stat-label">카테고리</span>
      </div>
    </div>
  </div>
</header>

<div class="layout">
  <aside class="sidebar" id="sidebar"></aside>
  <main class="main" id="mainContent"></main>
</div>

<!-- Upload FAB -->
<div class="upload-panel">
  <button class="upload-toggle" id="uploadToggle" title="회의록 업로드">
    <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" y1="3" x2="12" y2="15"/></svg>
  </button>
</div>

<!-- Upload Modal -->
<div class="upload-modal" id="uploadModal">
  <div class="upload-box" style="position:relative;">
    <button class="upload-close" id="uploadClose">✕</button>
    <div class="upload-title">📄 회의록에서 용어 자동 추출</div>
    <div class="upload-subtitle">회의록(.docx, .txt)을 업로드하면 AI가 새로운 전문 용어를 추출합니다</div>
    
    <div class="dropzone" id="dropzone">
      <div class="dropzone-icon">📁</div>
      <div class="dropzone-text">파일을 드래그하거나 클릭하여 선택</div>
      <div class="dropzone-hint">.docx 또는 .txt 파일 지원</div>
    </div>
    <input type="file" id="fileInput" accept=".docx,.txt" style="display:none">
    
    <div class="file-info" id="fileInfo">
      <span>📎</span>
      <span class="file-name" id="fileName"></span>
      <button class="file-remove" id="fileRemove">✕</button>
    </div>
    
    <button class="extract-btn" id="extractBtn">🔍 용어 추출 시작</button>
    
    <div class="progress-area" id="progressArea">
      <div class="progress-bar-wrap">
        <div class="progress-bar" id="progressBar"></div>
      </div>
      <div class="progress-text" id="progressText">회의록 분석 중...</div>
    </div>
    
    <div class="results-area" id="resultsArea">
      <div class="results-header">
        <span class="results-title">추출된 용어</span>
        <span class="results-count" id="resultsCount">0개</span>
      </div>
      <div id="resultsList"></div>
      <button class="add-btn" id="addBtn">✅ 선택한 용어 추가</button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
// ========== GLOSSARY DATA ==========

 "안정성 시험", "eng": "Stability Test", "abbr": "-", "pron": "스태빌리티 테스트", "desc": "항체가 일정 기간 원래 기능을 유지하는지 검사. Safety(안전성=독성 검사)와 다른 개념. 보관 온도, 보관 기간, 개봉 후 사용 시간 등을 평가"}, {"category": "📊 분석 및 안정성 관련 용어", "term": "등전점", "eng": "Isoelectric Point", "abbr": "pI", "pron": "피-아이", "desc": "단백질 순전하가 0이 되는 pH. 이 지점에서 응집이 잘 일어나 가장 불안정. 제형 pH를 pI보다 낮게(pH 5~6.2) 유지하는 것이 핵심"}, {"category": "📊 분석 및 안정성 관련 용어", "term": "산도", "eng": "pH (potential of Hydrogen)", "abbr": "pH", "pron": "피-에이치", "desc": "용액의 산성/염기성 정도. 7이 중성, <7 산성, >7 염기성. 항체 제형은 보통 pH 5~6.2 약산성"}, {"category": "📊 분석 및 안정성 관련 용어", "term": "응집", "eng": "Aggregation", "abbr": "-", "pron": "애그리게이션", "desc": "항체 분자들이 서로 뭉쳐 덩어리를 형성하는 현상. 면역 반응을 유발할 수 있어 반드시 방지해야 함. 계면활성제가 억제"}, {"category": "📊 분석 및 안정성 관련 용어", "term": "소수성", "eng": "Hydrophobicity", "abbr": "-", "pron": "하이드로포비시티", "desc": "물을 멀리하는(물에 안 녹는) 성질. 기름이 물에 안 섞이는 것이 예시. '소(疏)원해진다'의 소"}, {"category": "📊 분석 및 안정성 관련 용어", "term": "친수성", "eng": "Hydrophilicity", "abbr": "-", "pron": "하이드로필리시티", "desc": "물과 친한(물에 잘 녹는) 성질. 설탕이 물에 잘 녹는 것이 예시"}, {"category": "📊 분석 및 안정성 관련 용어", "term": "등장성", "eng": "Isotonicity / Tonicity", "abbr": "-", "pron": "아이소토니시티", "desc": "주사액의 삼투압이 혈액과 같은 상태. 등장성이 맞지 않으면 세포가 쪼그라들거나 터질 수 있음. NaCl이 등장성 조절에 사용됨"}, {"category": "📊 분석 및 안정성 관련 용어", "term": "삼투압", "eng": "Osmotic Pressure / Osmolality", "abbr": "-", "pron": "오스모틱 프레셔", "desc": "반투막을 통해 용매가 이동하려는 압력. 주사액에서 삼투압이 너무 높으면 통증·조직 손상 유발. SC 고농도 제형에서 NaCl 사용이 줄어드는 이유"}, {"category": "📊 분석 및 안정성 관련 용어", "term": "항산화제", "eng": "Antioxidant", "abbr": "-", "pron": "앤티옥시던트", "desc": "산화(산소에 의한 손상)를 막아주는 물질. 메티오닌이 대표적. SC 고농도 제형에서 산화 위험이 커져 사용 증가"}, {"category": "📊 분석 및 안정성 관련 용어", "term": "킬레이터", "eng": "Chelator", "abbr": "-", "pron": "킬레이터", "desc": "금속 이온을 붙잡아 무력화시키는 물질. 게의 집게(chela)에서 유래. EDTA가 대표적 킬레이터로 금속 이온에 의한 항체 산화를 방지"}, {"category": "📊 분석 및 안정성 관련 용어", "term": "수화층", "eng": "Hydration Shell / Water Layer", "abbr": "-", "pron": "하이드레이션 셸", "desc": "안정화제(수크로스 등)가 항체 표면의 물을 흡수하여 형성하는 보호막. 교수님 비유: '설탕 같은 걸 넣어주면 항체 표면에 물층을 만들어 코팅된 것처럼 실타래가 안 풀림'. 이 수화층이 항체의 3D 구조를 보존하는 핵심 메커니즘"}, {"category": "📊 분석 및 안정성 관련 용어", "term": "전하", "eng": "Charge (Net Charge)", "abbr": "-", "pron": "차지 (넷 차지)", "desc": "단백질 표면의 (+) 또는 (-) 전기적 성질. pH가 등전점(pI)보다 낮으면 양전하(+), 높으면 음전하(-)를 띰. 같은 전하를 띠면 서로 밀어내므로 응집이 방지됨. 그래서 pH를 pI 이하로 유지하는 것이 중요"}, {"category": "📊 분석 및 안정성 관련 용어", "term": "엔트로피", "eng": "Entropy", "abbr": "-", "pron": "엔트로피", "desc": "열역학 제2법칙에 따른 '무질서도'. 교수님 설명: '지구상에 있는 모든 것은 항상 무질서하게 망가지거나 훼손되는 경향이 있음'. 단백질도 자연 상태에서 실타래가 풀려 기능을 잃는 방향으로 변하므로, 이를 막기 위해 첨가물이 필요"}, {"category": "📊 분석 및 안정성 관련 용어", "term": "동결건조", "eng": "Lyophilization / Freeze-drying", "abbr": "-", "pron": "라이오필라이제이션", "desc": "용액을 얼린 후 진공에서 수분을 제거하여 분말로 만드는 기술. 장기 보관에 유리. IV 제형에서 Sucrose/Trehalose가 동결건조 보호제(lyoprotectant)로 사용"}, {"category": "📊 분석 및 안정성 관련 용어", "term": "아미노산 서열", "eng": "Amino Acid Sequence", "abbr": "-", "pron": "어미노 애시드 시퀀스", "desc": "단백질을 구성하는 아미노산의 연결 순서. 20종의 아미노산이 수 개~3,000개까지 사슬처럼 연결. 이 서열이 항체의 3D 구조, 기능, 페노타입을 결정"}, {"category": "📊 분석 및 안정성 관련 용어", "term": "히트맵", "eng": "Heatmap", "abbr": "-", "pron": "히트맵", "desc": "값의 크기를 색상 농도로 표현한 그래프. 본 문서에서 첨가물 사용률(%)을 색상으로 표시. 진한색(빨간색)일수록 사용률 높음. FDA+EMA 전체 데이터 사용"}, {"category": "📊 분석 및 안정성 관련 용어", "term": "박스플롯", "eng": "Box Plot", "abbr": "-", "pron": "박스플롯", "desc": "데이터 분포를 상자와 수염으로 보여주는 그래프. 중앙값, 사분위수, 이상값을 한눈에 파악. 본 문서에서 첨가물 농도 분포 표시. FDA 데이터만 사용"}, {"category": "📊 분석 및 안정성 관련 용어", "term": "인과 모델", "eng": "Causal Model", "abbr": "-", "pron": "코절 모델", "desc": "원인과 결과의 관계를 그래프로 표현하는 분석 방법. 아미노산 서열 → 항체 특성 → 첨가물 선택 → 안정성 결과의 경로를 모델링하는 것이 향후 연구 과제"}, {"category": "🏛️ 규제 기관 및 도구", "term": "미국 식약처", "eng": "Food and Drug Administration", "abbr": "FDA", "pron": "에프-디-에이", "desc": "미국의 의약품 승인·감독 기관. 첨가물 농도 데이터를 상세 공개(채움률 31~54%). 본 분석의 농도 데이터(박스플롯)는 FDA만 사용. 수집 209건"}, {"category": "🏛️ 규제 기관 및 도구", "term": "유럽 의약품청", "eng": "European Medicines Agency", "abbr": "EMA", "pron": "이-엠-에이", "desc": "유럽연합의 의약품 승인·감독 기관. 첨가물 사용 여부는 확인 가능하나 ical Methods)", "term": "크기배제 크로마토그래피", "eng": "Size Exclusion Chromatography", "abbr": "SEC", "pron": "에스-이-씨 (섹)", "desc": "단백질을 크기별로 분리하는 분석법. 체로 거르듯이 큰 입자(응집체)와 정상 항체를 분리. 항체 안정성 평가의 핵심 분석법"}, {"category": "🧪 실험·분석 장비 및 기법 (Experimental & Analytical Methods)", "term": "동적 광산란", "eng": "Dynamic Light Scattering", "abbr": "DLS", "pron": "디-엘-에스", "desc": "레이저 빛을 쏘아 입자 크기 분포를 측정하는 분석법. 항체가 뭉쳐 있는지(응집) 확인하는 데 사용"}, {"category": "🧪 실험·분석 장비 및 기법 (Experimental & Analytical Methods)", "term": "탁도", "eng": "Turbidity", "abbr": "-", "pron": "터비디티", "desc": "용액이 얼마나 흐린지를 나타내는 지표. 맑은 물 vs 뿌연 물의 차이. 항체가 응집되면 용액이 흐려지므로 안정성의 간접 지표"}, {"category": "🧪 실험·분석 장비 및 기법 (Experimental & Analytical Methods)", "term": "버퍼 교환", "eng": "Buffer Exchange", "abbr": "-", "pron": "버퍼 익스체인지", "desc": "항체가 담긴 용액의 완충 조건을 바꾸는 과정. 다이얼리시스나 한외여과로 수행. 제형 매트릭스 제조의 필수 단계"}, {"category": "🧪 실험·분석 장비 및 기법 (Experimental & Analytical Methods)", "term": "다이얼리시스", "eng": "Dialysis", "abbr": "-", "pron": "다이얼리시스", "desc": "반투막을 이용하여 용액 속 작은 분자(염, 완충제)만 교환하는 정제 기법. 티백처럼 항체는 막 안에 남고 주변 용액 조건만 바뀜"}, {"category": "🧪 실험·분석 장비 및 기법 (Experimental & Analytical Methods)", "term": "이니셜 풀", "eng": "Initial Pool", "abbr": "-", "pron": "이니셜 풀", "desc": "세포에 유전자를 넣어(트랜스펙션) 항체를 발현시킨 초기 세포 집합. 여기서 생산성이 높은 클론을 선별하여 대량 배양에 사용"}, {"category": "🧪 실험·분석 장비 및 기법 (Experimental & Analytical Methods)", "term": "트랜스펙션", "eng": "Transfection", "abbr": "-", "pron": "트랜스펙션", "desc": "외부 DNA(유전자)를 세포 안에 넣는 기술. 항체 유전자를 CHO 세포 등에 넣어 항체를 발현시키는 첫 단계. 이니셜 풀 생성의 전 단계"}, {"category": "🧪 실험·분석 장비 및 기법 (Experimental & Analytical Methods)", "term": "클론 선별", "eng": "Clone Selection", "abbr": "-", "pron": "클론 셀렉션", "desc": "트랜스펙션 후 생성된 세포(이니셜 풀)에서 항체 생산성이 높은 단일 세포(클론)를 골라내는 과정. 이후 대량 배양의 기반이 됨"}, {"category": "🧪 실험·분석 장비 및 기법 (Experimental & Analytical Methods)", "term": "Ex-vivo 모델", "eng": "Ex-vivo Model", "abbr": "-", "pron": "엑스비보 모델", "desc": "생체 외(ex-vivo) 조직을 이용한 실험 모델. 본 과제에서는 돼지 사체 피부에 실제 주사를 시행하여 조직 저항 포함 주사성을 평가하는 아이디어가 논의됨. IRB 승인 없이 수행 가능   for (const [key, color] of Object.entries(CAT_COLORS)) {
    if (cat && cat.startsWith(key)) return color;
  }
  return '#64748b';
}

function getCatShort(cat) {
  if (!cat) return '';
  const m = cat.match(/^[^\s]+\s+(.+?)(?:\s*\(|$)/);
  return m ? m[1] : cat;
}

// ========== STATE ==========
let glossary = [...INITIAL_DATA];
let activeCategory = null;
let searchQuery = '';
let uploadedText = '';
let uploadedFileName = '';

// ========== RENDER ==========
function getCategories() {
  const cats = [];
  const counts = {};
  for (const item of glossary) {
    if (!counts[item.category]) {
      counts[item.category] = 0;
      cats.push(item.category);
    }
    counts[item.category]++;
  }
  return cats.map(c => ({ name: c, count: counts[c] }));
}

function getFiltered() {
  let items = glossary;
  if (activeCategory) {
    items = items.filter(i => i.category === activeCategory);
  }
  if (searchQuery) {
    const q = searchQuery.toLowerCase();
    items = items.filter(i =>
      i.term.toLowerCase().includes(q) ||
      i.eng.toLowerCase().includes(q) ||
      i.abbr.toLowerCase().includes(q) ||
      i.pron.toLowerCase().includes(q) ||
      i.desc.toLowerCase().includes(q)
    );
  }
  return items;
}

function renderSidebar() {
  const cats = getCategories();
  const sb = document.getElementById('sidebar');
  sb.innerHTML = `
    <button class="sidebar-btn ${!activeCategory ? 'active' : ''}" onclick="setCategory(null)">
      <span class="cat-dot" style="background:#64748b"></span>
      전체 보기
      <span class="cat-count">${glossary.length}</span>
    </button>
  ` + cats.map(c => `
    <button class="sidebar-btn ${activeCategory === c.name ? 'active' : ''}" 
            onclick="setCategory('${c.name.replace(/'/g, "\\'")}')" title="${c.name}">
      <span class="cat-dot" style="background:${getCatColor(c.name)}"></span>
      ${getCatShort(c.name)}
      <span class="cat-count">${c.count}</span>
    </button>
  `).join('');
}

function renderMain() {
  const filtered = getFiltered();
  const main = document.getElementById('mainContent');
  
  document.getElementById('termCount').textContent = glossary.length;
  document.getElementById('catCount').textContent = getCategories().length;
  document.getElementById('searchCount').textContent = searchQuery ? `${filtered.length}건` : '';

  if (filtered.length === 0) {
    main.innerHTML = `
      <div class="empty-state">
        <div class="empty-state-icon">🔍</div>
        <div class="empty-state-text">검색 결과가 없습니다</div>
      </div>`;
    return;
  }

  // Group by category
  const groups = {};
  for (const item of filtered) {
    if (!groups[item.category]) groups[item.category] = [];
    groups[item.category].push(item);
  }

  let html = '';
  for (const [cat, items] of Object.entries(groups)) {
    const color = getCatColor(cat);
    html += `
      <section class="category-section" id="cat-${encodeURIComponent(cat)}">
        <div class="category-header">
          <span class="category-dot" style="background:${color}"></span>
          <span class="category-name">${cat}</span>
          <span class="category-count">${items.length}</span>
        </div>
        <div class="term-grid">
          ${items.map(item => {
            const isNew = item._new;
            const idx = glossary.indexOf(item);
            return `
              <div class="term-card ${isNew ? 'new-term' : ''}" data-idx="${idx}">
                <button class="term-edit-btn" onclick="startEdit(${idx})" title="편집">
                  <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M17 3a2.85 2.85 0 1 1 4 4L7.5 20.5 2 22l1.5-5.5Z"/><path d="m15 5 4 4"/></svg>
                </button>
                <div class="term-view">
                  <div class="term-top">
                    <span class="term-kr">${hl(item.term)}</span>
                    <span class="term-eng">${hl(item.eng)}</span>
                  </div>
                  <div class="term-meta">
                    ${item.abbr && item.abbr !== '-' ? `<span class="term-badge badge-abbr">${hl(item.abbr)}</span>` : ''}
                    ${item.pron ? `<span class="term-badge badge-pron">${item.pron}</span>` : ''}
                  </div>
                  <div class="term-desc">${hl(item.desc)}</div>
                </div>
                <div class="term-form">
                  <div class="edit-row">
                    <div class="edit-field">
                      <label class="edit-label">용어</label>
                      <input class="edit-input" data-field="term" value="${escAttr(item.term)}">
                    </div>
                    <div class="edit-field">
                      <label class="edit-label">영문명</label>
                      <input class="edit-input" data-field="eng" value="${escAttr(item.eng)}">
                    </div>
                  </div>
                  <div class="edit-row">
                    <div class="edit-field">
                      <label class="edit-label">약어</label>
                      <input class="edit-input" data-field="abbr" value="${escAttr(item.abbr)}">
                    </div>
                    <div class="edit-field">
                      <label class="edit-label">읽는 법</label>
                      <input class="edit-input" data-field="pron" value="${escAttr(item.pron)}">
                    </div>
                  </div>
                  <div class="edit-field">
                    <label class="edit-label">설명</label>
                    <textarea class="edit-textarea" data-field="desc" rows="3">${escHtml(item.desc)}</textarea>
                  </div>
                  <div class="edit-actions">
                    <button class="edit-delete" onclick="deleteItem(${idx})">🗑 삭제</button>
                    <button class="edit-cancel" onclick="cancelEdit(${idx})">취소</button>
                    <button class="edit-save" onclick="saveEdit(${idx})">저장</button>
                  </div>
                </div>
              </div>`;
          }).join('')}
        </div>
      </section>`;
  }
  main.innerHTML = html;
}

function hl(text) {
  if (!searchQuery) return text;
  const q = searchQuery.replace(/[.*+?^${}()|[\]\\]/g, '\\$&');
  return text.replace(new RegExp(`(${q})`, 'gi'), '<mark style="background:rgba(59,130,246,0.15);color:inherit;border-radius:2px;padding:0 1px">$1</mark>');
}

function escAttr(s) { return s.replace(/&/g,'&amp;').replace(/"/g,'&quot;').replace(/</g,'&lt;'); }
function escHtml(s) { return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }

function setCategory(cat) {
  activeCategory = cat;
  renderSidebar();
  renderMain();
}

// ========== EDIT ==========
function startEdit(idx) {
  const card = document.querySelector(`.term-card[data-idx="${idx}"]`);
  if (!card) return;
  // Close any other open edits
  document.querySelectorAll('.term-card.editing').forEach(c => {
    if (c !== card) c.classList.remove('editing');
  });
  card.classList.add('editing');
  // Focus first input
  setTimeout(() => {
    const inp = card.querySelector('.edit-input');
    if (inp) inp.focus();
  }, 50);
}

function cancelEdit(idx) {
  const card = document.querySelector(`.term-card[data-idx="${idx}"]`);
  if (card) card.classList.remove('editing');
  // Reset fields to original values
  renderMain();
}

function saveEdit(idx) {
  const card = document.querySelector(`.term-card[data-idx="${idx}"]`);
  if (!card) return;
  const item = glossary[idx];
  if (!item) return;

  const fields = ['term', 'eng', 'abbr', 'pron'];
  fields.forEach(f => {
    const inp = card.querySelector(`[data-field="${f}"]`);
    if (inp) item[f] = inp.value.trim();
  });
  const descArea = card.querySelector('[data-field="desc"]');
  if (descArea) item.desc = descArea.value.trim();

  renderSidebar();
  renderMain();
  showToast(`✏️ "${item.term}" 수정 완료`, 'success');
}

function deleteItem(idx) {
  const item = glossary[idx];
  if (!item) return;
  if (!confirm(`"${item.term}" 용어를 삭제하시겠습니까?`)) return;
  const name = item.term;
  glossary.splice(idx, 1);
  renderSidebar();
  renderMain();
  showToast(`🗑 "${name}" 삭제됨`, '');
}

// ========== SEARCH ==========
document.getElementById('searchInput').addEventListener('input', (e) => {
  searchQuery = e.target.value.trim();
  renderMain();
});

// ========== FILE UPLOAD ==========
const dropzone = document.getElementById('dropzone');
const fileInput = document.getElementById('fileInput');
const fileInfo = document.getElementById('fileInfo');
const fileName = document.getElementById('fileName');
const extractBtn = document.getElementById('extractBtn');

dropzone.addEventListener('click', () => fileInput.click());
dropzone.addEventListener('dragover', (e) => { e.preventDefault(); dropzone.classList.add('dragover'); });
dropzone.addEventListener('dragleave', () => dropzone.classList.remove('dragover'));
dropzone.addEventListener('drop', (e) => {
  e.preventDefault();
  dropzone.classList.remove('dragover');
  if (e.dataTransfer.files.length) handleFile(e.dataTransfer.files[0]);
});
fileInput.addEventListener('change', (e) => {
  if (e.target.files.length) handleFile(e.target.files[0]);
});
document.getElementById('fileRemove').addEventListener('click', clearFile);

async function handleFile(file) {
  const ext = file.name.split('.').pop().toLowerCase();
  if (!['docx', 'txt'].includes(ext)) {
    showToast('⚠️ .docx 또는 .txt 파일만 지원합니다', 'error');
    return;
  }
  uploadedFileName = file.name;
  fileName.textContent = file.name;
  fileInfo.classList.add('show');
  dropzone.style.display = 'none';
  extractBtn.classList.add('ready');

  if (ext === 'txt') {
    uploadedText = await file.text();
  } else {
    const arrayBuffer = await file.arrayBuffer();
    const result = await mammoth.extractRawText({ arrayBuffer });
    uploadedText = result.value;
  }
}

function clearFile() {
  uploadedText = '';
  uploadedFileName = '';
  fileInfo.classList.remove('show');
  dropzone.style.display = '';
  extractBtn.classList.remove('ready');
  fileInput.value = '';
  document.getElementById('resultsArea').classList.remove('show');
  document.getElementById('progressArea').classList.remove('show');
}

// ========== MODAL ==========
document.getElementById('uploadToggle').addEventListener('click', () => {
  document.getElementById('uploadModal').classList.add('show');
});
document.getElementById('uploadClose').addEventListener('click', closeModal);
document.getElementById('uploadModal').addEventListener('click', (e) => {
  if (e.target === e.currentTarget) closeModal();
});
function closeModal() {
  document.getElementById('uploadModal').classList.remove('show');
}

// ========== AI EXTRACTION ==========
extractBtn.addEventListener('click', async () => {
  if (!uploadedText) return;
  
  extractBtn.classList.add('loading');
  extractBtn.textContent = '⏳ AI 분석 중...';
  const progressArea = document.getElementById('progressArea');
  const progressBar = document.getElementById('progressBar');
  const progressText = document.getElementById('progressText');
  progressArea.classList.add('show');
  document.getElementById('resultsArea').classList.remove('show');
  
  progressBar.style.width = '20%';
  progressText.textContent = '회의록 텍스트 전처리 중...';

  // Build existing terms list for dedup
  const existingTerms = glossary.map(g => `${g.term} (${g.eng})`).join(', ');
  
  // Truncate meeting text if too long
  const meetingText = uploadedText.length > 12000 ? uploadedText.slice(0, 12000) + '\n...(truncated)' : uploadedText;

  progressBar.style.width = '40%';
  progressText.textContent = 'Claude에게 용어 추출 요청 중...';

  const systemPrompt = `You are a bilingual (Korean/English) pharmaceutical terminology expert specializing in antibody formulation (SC mAb).

Given a meeting transcript or minutes, extract NEW technical terms that should be in a glossary. 

EXISTING terms (DO NOT extract these again): ${existingTerms}

For each new term, provide:
- term: Korean term
- eng: English term
- abbr: Abbreviation (or "-")
- pron: Korean pronunciation guide
- desc: Description in Korean (1-2 sentences, accessible to non-experts, with analogy if possible)
- category: One of these exact categories:
  📋 제형 관련 기본 용어 (Formulation Basics)
  💉 투여 경로 (Route of Administration)
  🧴 계면활성제 (Surfactant, 서팩턴트)
  ⚗️ 완충제 (Buffer, 버퍼)
  🛡️ 안정화제 (Stabilizer, 스테빌라이저)
  🔧 기타 첨가물 (Others)
  🔬 항체 분류 - 페노타입 (Phenotype)
  🧬 항체 기원 (Antibody Origin)
  🏥 적응증 (Indication)
  💊 예시 제품명 (Example Products)
  📊 분석 및 안정성 관련 용어
  🏛️ 규제 기관 및 도구
  🧪 실험·분석 장비 및 기법 (Experimental & Analytical Methods)
  🩺 약동학 및 임상 관련 (Pharmacokinetics & Clinical)
  🤖 AI·소프트웨어 관련 (AI & Software)
  🏗️ 제도·인증 관련 (Regulatory & Certification)

Only extract terms that are:
1. Technical/domain-specific (not common words)
2. Actually mentioned in the meeting text
3. NOT already in the existing terms list

Respond ONLY with a JSON array. No markdown, no backticks, no preamble.
Example: [{"term":"용어","eng":"English","abbr":"-","pron":"발음","desc":"설명","category":"📋 제형 관련 기본 용어 (Formulation Basics)"}]
If no new terms found, return: []`;

  try {
    const response = await fetch("https://api.anthropic.com/v1/messages", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({
        model: "claude-sonnet-4-20250514",
        max_tokens: 4000,
        system: systemPrompt,
        messages: [
          { role: "user", content: `다음 회의록에서 새로운 전문 용어를 추출해주세요:\n\n${meetingText}` }
        ]
      })
    });

    progressBar.style.width = '80%';
    progressText.textContent = '결과 분석 중...';

    const data = await response.json();
    const text = data.content.map(i => i.text || '').join('');
    const clean = text.replace(/```json|```/g, '').trim();
    
    let newTerms = [];
    try {
      newTerms = JSON.parse(clean);
    } catch (e) {
      // Try to find JSON array in the response
      const match = clean.match(/\[[\s\S]*\]/);
      if (match) newTerms = JSON.parse(match[0]);
    }

    progressBar.style.width = '100%';
    progressText.textContent = '완료!';

    // Check for duplicates
    const existingSet = new Set(glossary.map(g => g.term.toLowerCase()));
    const existingEngSet = new Set(glossary.map(g => g.eng.toLowerCase()));

    newTerms = newTerms.map(t => ({
      ...t,
      _duplicate: existingSet.has(t.term.toLowerCase()) || existingEngSet.has(t.eng.toLowerCase())
    }));

    renderResults(newTerms);
    
  } catch (err) {
    progressText.textContent = '❌ 오류 발생: ' + err.message;
    showToast('API 호출 오류가 발생했습니다', 'error');
  }

  extractBtn.classList.remove('loading');
  extractBtn.textContent = '🔍 용어 추출 시작';
  extractBtn.classList.add('ready');
});

function renderResults(terms) {
  const resultsArea = document.getElementById('resultsArea');
  const resultsList = document.getElementById('resultsList');
  const resultsCount = document.getElementById('resultsCount');
  
  const nonDup = terms.filter(t => !t._duplicate);
  resultsCount.textContent = `${nonDup.length}개 신규`;

  if (terms.length === 0) {
    resultsList.innerHTML = '<div style="text-align:center;padding:20px;color:var(--text3)">새로운 용어가 발견되지 않았습니다</div>';
    resultsArea.classList.add('show');
    document.getElementById('addBtn').style.display = 'none';
    return;
  }

  resultsList.innerHTML = terms.map((t, i) => `
    <div class="result-item" style="${t._duplicate ? 'opacity:0.5' : ''}">
      <input type="checkbox" class="result-check" data-idx="${i}" ${!t._duplicate ? 'checked' : ''} ${t._duplicate ? 'disabled' : ''}>
      <div class="result-body">
        <div class="result-term">${t.term} <span style="color:var(--text3);font-weight:400;font-size:12px">${t.eng}</span></div>
        ${t.abbr && t.abbr !== '-' ? `<div class="result-eng" style="font-family:'JetBrains Mono',monospace">${t.abbr}</div>` : ''}
        <div class="result-desc">${t.desc}</div>
        ${t._duplicate ? '<span class="result-dup">⚠ 이미 존재하는 용어</span>' : ''}
      </div>
    </div>
  `).join('');

  document.getElementById('addBtn').style.display = '';
  resultsArea.classList.add('show');

  // Store for adding
  window._extractedTerms = terms;
}

// ========== ADD TERMS ==========
document.getElementById('addBtn').addEventListener('click', () => {
  const checks = document.querySelectorAll('.result-check:checked');
  const terms = window._extractedTerms || [];
  let added = 0;

  checks.forEach(cb => {
    const idx = parseInt(cb.dataset.idx);
    const t = terms[idx];
    if (t && !t._duplicate) {
      glossary.push({
        category: t.category,
        term: t.term,
        eng: t.eng,
        abbr: t.abbr || '-',
        pron: t.pron || '',
        desc: t.desc,
        _new: true
      });
      added++;
    }
  });

  if (added > 0) {
    renderSidebar();
    renderMain();
    showToast(`✅ ${added}개 용어가 추가되었습니다`, 'success');
    closeModal();
    clearFile();
  } else {
    showToast('추가할 용어가 없습니다', 'error');
  }
});

// ========== TOAST ==========
function showToast(msg, type = '') {
  const toast = document.getElementById('toast');
  toast.textContent = msg;
  toast.className = 'toast show ' + type;
  setTimeout(() => toast.className = 'toast', 3000);
}

// ========== INIT ==========
renderSidebar();
renderMain();
</script>
</body>
</html>
